name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        # macOS (BSD userland) is the primary target and guards the sed/grep
        # portability traps; Linux (GNU) is the cross-platform check.
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install zsh (Linux only; macOS ships it)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y zsh
      - name: Run test suite
        run: zsh test/run.zsh
